name: E2E Tests

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  e2e:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        firewall-backend: [nftables, iptables]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install kind
        run: go install sigs.k8s.io/kind@latest

      - name: Run E2E tests (${{ matrix.firewall-backend }})
        run: ./testing/e2e-test.sh
        env:
          FIREWALL_BACKEND: ${{ matrix.firewall-backend }}
