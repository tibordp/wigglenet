kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: wigglenet
rules:
  - apiGroups:
      - ""
    resources:
      - nodes
    verbs:
      - get
      - list
      - watch
      - update
  # NetworkPolicy support requires access to pods, namespaces, and networkpolicies
  - apiGroups:
      - ""
    resources:
      - pods
      - namespaces
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - networking.k8s.io
    resources:
      - networkpolicies
    verbs:
      - get
      - list
      - watch
  # Required for kube-rbac-proxy to perform SubjectAccessReviews
  - apiGroups:
      - authentication.k8s.io
    resources:
      - tokenreviews
    verbs:
      - create
  - apiGroups:
      - authorization.k8s.io
    resources:
      - subjectaccessreviews
    verbs:
      - create
---
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: wigglenet
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: wigglenet
subjects:
- kind: ServiceAccount
  name: wigglenet
  namespace: kube-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: wigglenet
  namespace: kube-system
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: wigglenet-rbac-proxy-config
  namespace: kube-system
data:
  config-file.yaml: |
    authorization:
      resourceAttributes:
        namespace: kube-system
        apiVersion: v1
        resource: services
        subresource: wigglenet
        name: wigglenet
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: wigglenet
  namespace: kube-system
  labels:
    app: wigglenet
spec:
  selector:
    matchLabels:
      app: wigglenet
  template:
    metadata:
      labels:
        app: wigglenet
    spec:
      hostNetwork: true
      tolerations:
      - operator: Exists
      serviceAccountName: wigglenet
      priorityClassName: system-node-critical
      automountServiceAccountToken: true
      containers:
      - name: wigglenet
        image: ghcr.io/tibordp/wigglenet:v0.5.0
        imagePullPolicy: Always
        env:
          # Masquerade outgoing IPv4 traffic not destined
          # to pod on another node
        - name: MASQUERADE_IPV4
          value: "1"

          # Masquerade outgoing IPv6 traffic not destined
          # to pod on another node
        - name: MASQUERADE_IPV6
          value: "1"

          # Filter direct IPv4 traffic to pods from
          # outside the cluster
        - name: FILTER_IPV4
          value: "0"

          # Filter direct IPv6 traffic to pods from
          # outside the cluster
        - name: FILTER_IPV6
          value: "0"

          # Aditional interfaces from which to take the node's
          # host IP address (default: none)
        - name: NODE_IP_INTERFACES
          value: ""

          # The source of IPv6 subnets for node pod networks
          # ("none", "spec", "file")
        - name: POD_CIDR_SOURCE_IPV4
          value: "spec"

          # The source of IPv4 subnets for node pod networks
          # ("none", "spec", "file")
        - name: POD_CIDR_SOURCE_IPV6
          value: "spec"

          # The file from which to read the pod CIDRs if "file"
          # mode is used
        - name: POD_CIDR_SOURCE_PATH
          value: "/etc/wigglenet/cidrs.txt"

          # Use native routing instead of the overlay network
          # for IPv6 traffic
        - name: NATIVE_ROUTING_IPV6
          value: "0"

          # Use native routing instead of the overlay network
          # for IPv4 traffic
        - name: NATIVE_ROUTING_IPV4
          value: "0"

          # Enable NetworkPolicy support (requires RBAC permissions for
          # pods, namespaces, and networkpolicies)
        - name: ENABLE_NETWORK_POLICY
          value: "1"

          # Firewall backend ("nftables" or "iptables")
        - name: FIREWALL_BACKEND
          value: "nftables"

          # Enable Prometheus metrics endpoint
        - name: ENABLE_METRICS
          value: "1"

          # Bind metrics on localhost only — kube-rbac-proxy sidecar
          # handles external access with Kubernetes authentication.
        - name: METRICS_BIND_ADDR
          value: "127.0.0.1:9091"

        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        volumeMounts:
        - name: cfg
          mountPath: /etc/wigglenet
        - name: cni-cfg
          mountPath: /etc/cni/net.d
        # Only needed for iptables backend
        - name: xtables-lock
          mountPath: /run/xtables.lock
          readOnly: false
        - name: lib-modules
          mountPath: /lib/modules
          readOnly: true
        resources:
          requests:
            cpu: "100m"
            memory: "50Mi"
          limits:
            cpu: "100m"
            memory: "50Mi"
        securityContext:
          privileged: false
          capabilities:
            add: ["NET_RAW", "NET_ADMIN"]
      # kube-rbac-proxy authenticates metrics scrape requests using
      # Kubernetes TokenReview/SubjectAccessReview so the metrics port
      # can be safely exposed on the host network.
      - name: kube-rbac-proxy
        image: quay.io/brancz/kube-rbac-proxy:v0.20.1
        args:
        - --secure-listen-address=:9091
        - --upstream=http://127.0.0.1:9091/
        - --proxy-endpoints-port=9092
        - --config-file=/etc/kube-rbac-proxy-config/config-file.yaml
        ports:
        - name: https-metrics
          containerPort: 9091
          protocol: TCP
        - name: http-healthz
          containerPort: 9092
          protocol: TCP
        readinessProbe:
          httpGet:
            path: healthz
            port: 9092
            scheme: HTTPS
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            cpu: "10m"
            memory: "20Mi"
          limits:
            cpu: "20m"
            memory: "40Mi"
        volumeMounts:
        - name: kube-rbac-proxy-config
          mountPath: /etc/kube-rbac-proxy-config
      volumes:
      - name: cfg
        hostPath:
          path: /etc/wigglenet
      - name: cni-cfg
        hostPath:
          path: /etc/cni/net.d
      # Only needed for iptables backend
      - name: xtables-lock
        hostPath:
          path: /run/xtables.lock
          type: FileOrCreate
      - name: lib-modules
        hostPath:
          path: /lib/modules
      - name: kube-rbac-proxy-config
        configMap:
          name: wigglenet-rbac-proxy-config
---
# ServiceMonitor for prometheus-operator / kube-prometheus-stack.
# Uses HTTPS with bearer token authentication via kube-rbac-proxy.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: wigglenet
  namespace: kube-system
  labels:
    app: wigglenet
spec:
  endpoints:
  - bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
    port: https-metrics
    path: /metrics
    scheme: https
    tlsConfig:
      insecureSkipVerify: true
    interval: 30s
  selector:
    matchLabels:
      app: wigglenet
  # ---
  # If you don't need kube-rbac-proxy authentication (e.g. trusted network),
  # you can simplify the setup:
  #
  # 1. Remove the kube-rbac-proxy sidecar container, its ConfigMap, and the
  #    authentication.k8s.io / authorization.k8s.io RBAC rules
  # 2. Set METRICS_BIND_ADDR to ":9091" instead of "127.0.0.1:9091"
  # 3. Add a named port to the wigglenet container:
  #      ports:
  #      - name: metrics
  #        containerPort: 9091
  # 4. Replace this ServiceMonitor with a PodMonitor:
  #
  #    apiVersion: monitoring.coreos.com/v1
  #    kind: PodMonitor
  #    metadata:
  #      name: wigglenet
  #      namespace: kube-system
  #      labels:
  #        app: wigglenet
  #    spec:
  #      selector:
  #        matchLabels:
  #          app: wigglenet
  #      podMetricsEndpoints:
  #      - port: metrics
  #        path: /metrics
  #        interval: 30s
